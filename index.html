<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DREAM CATALOGUE — MAPPA DEI SOGNI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;300;400;700&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="./favicon.svg?v=2">
</head>

<body>
    <div id="noise-overlay"></div>
    <div id="scanlines"></div>

    <!-- Header -->
    <header id="header">
        <div id="header-left">
            <span class="label">DREAM CATALOGUE</span>
            <span class="separator" id="header-sep">|</span>
            <span id="dream-count-label">N=<span id="dream-count">30</span></span>
        </div>
        <div id="header-right">
            <button id="lang-toggle" class="filter-btn">EN</button>
            <button id="menu-toggle" aria-label="Filters">&#9776;</button>
            <span id="clock"></span>
        </div>
    </header>

    <!-- Filter Bar -->
    <div id="filter-bar">
        <div class="filter-group">
            <span class="filter-label" data-i18n="connectBy">CONNECT BY:</span>
            <button class="filter-btn active" data-filter="mood">MOOD</button>
            <button class="filter-btn" data-filter="oggetti" data-i18n="objects">OBJECTS</button>
            <button class="filter-btn" data-filter="ambientazione">SETTING</button>
            <button class="filter-btn" data-filter="persone" data-i18n="people">PEOPLE</button>
            <button class="filter-btn" data-filter="prospettiva" data-i18n="perspective">PERSPECTIVE</button>
        </div>
        <div class="filter-group">
            <span class="filter-label" data-i18n="size">SIZE:</span>
            <button class="filter-btn active" data-size="importanza" data-i18n="importance">IMPORTANCE</button>
            <button class="filter-btn" data-size="bizzarria" data-i18n="weirdness">WEIRDNESS</button>
            <button class="filter-btn" data-size="ricordo" data-i18n="memory">MEMORY</button>
        </div>
    </div>

    <!-- Main canvas -->
    <div id="graph-container">
        <svg id="graph-svg"></svg>
        <div id="data-stream"></div>
    </div>

    <!-- Detail Panel -->
    <div id="detail-panel" class="panel-hidden">
        <div id="panel-drag-handle"></div>
        <button id="close-panel">✕ CLOSE</button>
        <div id="panel-id"></div>
        <h2 id="panel-title"></h2>
        <div id="panel-date"></div>
        <div class="panel-divider"></div>
        <div id="panel-metrics">
            <div class="metric">
                <span class="metric-label" data-i18n="memory">RICORDO</span>
                <div class="metric-bar-container">
                    <div class="metric-bar" id="bar-ricordo"></div>
                    <span class="metric-val" id="val-ricordo"></span>
                </div>
            </div>
            <div class="metric">
                <span class="metric-label" data-i18n="importance">IMPORTANZA</span>
                <div class="metric-bar-container">
                    <div class="metric-bar" id="bar-importanza"></div>
                    <span class="metric-val" id="val-importanza"></span>
                </div>
            </div>
            <div class="metric">
                <span class="metric-label" data-i18n="lucidity">LUCIDITÀ</span>
                <div class="metric-bar-container">
                    <div class="metric-bar" id="bar-lucidita"></div>
                    <span class="metric-val" id="val-lucidita"></span>
                </div>
            </div>
            <div class="metric">
                <span class="metric-label" data-i18n="weirdness">BIZZARRIA</span>
                <div class="metric-bar-container">
                    <div class="metric-bar" id="bar-bizzarria"></div>
                    <span class="metric-val" id="val-bizzarria"></span>
                </div>
            </div>
            <div class="metric">
                <span class="metric-label" data-i18n="duration">DURATA</span>
                <div class="metric-bar-container">
                    <div class="metric-bar" id="bar-durata"></div>
                    <span class="metric-val" id="val-durata"></span>
                </div>
            </div>
        </div>
        <div class="panel-divider"></div>
        <div id="panel-mood"></div>
        <div id="panel-ambientazione"></div>
        <div id="panel-oggetti"></div>
        <div id="panel-persone"></div>
        <div id="panel-prospettiva"></div>
        <div id="panel-musica"></div>
        <div id="panel-flags"></div>
        <div class="panel-divider"></div>
        <div id="panel-connections">
            <div class="section-label" data-i18n="connectedDreams">SOGNI COLLEGATI</div>
            <div id="connections-list"></div>
        </div>
    </div>

    <!-- Legend -->
    <button id="legend-toggle" data-i18n="legendBtn">LEGENDA MOOD</button>
    <div id="legend">
        <div id="legend-title" data-i18n="legendTitle">← LEGENDA MOOD</div>
        <div id="legend-items"></div>
    </div>

    <!-- Stats overlay -->
    <div id="stats-panel">
        <div class="stat-row" id="stat-total"></div>
        <div class="stat-row" id="stat-links"></div>
        <div class="stat-row" id="stat-selected"></div>
    </div>

    <!-- Mini data ticker -->
    <div id="data-ticker">
        <span id="ticker-content"></span>
    </div>

    <script src="dreams.json" type="application/json" id="dreams-data"></script>
    <script src="app.js"></script>
</body>


</html>
